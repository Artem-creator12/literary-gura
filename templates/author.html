<!DOCTYPE html>
<html>
<head>
    <title>Произведения {{ author.name }}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .book-card { 
            display: block; 
            padding: 15px 20px; 
            margin: 10px 0; 
            background: #f8f9fa; 
            border-radius: 8px; 
            text-decoration: none; 
            color: #333;
            border-left: 4px solid #4dabf7;
        }
        .book-card:hover { background: #e9ecef; }
        .back-link { color: #4dabf7; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .footer { 
            margin-top: 60px; 
            padding-top: 20px; 
            border-top: 1px solid #ddd; 
            font-size: 14px; 
            color: #888; 
            text-align: center; 
        }
        .footer a { 
            color: #4dabf7; 
            text-decoration: none; 
            font-weight: bold; 
        }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="{{ url_for('index') }}" class="back-link">← Назад к авторам</a>
    <h1>📖 Произведения {{ author.name }}</h1>
    {% for book in author.books %}
        <a href="{{ url_for('book_detail', book_id=book.id) }}" class="book-card">
            <strong>{{ book.title }}</strong>
        </a>
    {% else %}
        <p>У этого автора пока нет произведений.</p>
    {% endfor %}

    <div class="footer">
        <a href="https://t.me/ВАШ_КАНАЛ" target="_blank">📢 Наш Telegram-канал</a>
        <br>
        <span style="font-size: 12px; color: #aaa;">
            Проект существует на добровольных пожертвованиях. Все права на произведения принадлежат авторам.
        </span>
    </div>
</body>
</html>
